{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA GDF - Página no encontrada</title>
    <link rel="icon" href="{% static 'img/logosena.png' %}" type="image/png">

    <!-- Bootstrap CSS: CDN + fallback local si falla -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" id="bs-cdn-css">
    <script>
        !function(){
            var e = document.createElement('link');
            e.rel = 'stylesheet';
            e.href = '{% static "css/bootstrap.min.css" %}';
            e.id = 'bs-local-css';
            var t = document.getElementById('bs-cdn-css');
            t.parentNode.insertBefore(e, t.nextSibling);
        }();
    </script>

    <link rel="stylesheet" href="{% static 'css/error404.css' %}">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="error404-container d-flex align-items-center justify-content-center">
        <div class="error404-content shadow-lg p-4 text-center">
            <div class="error404-icon">
                <ion-icon name="alert-circle-outline"></ion-icon>
            </div>
            <h1 class="error404-title display-1 fw-bold">404</h1>
            <h2 class="error404-subtitle h4">¡Ups! Acceso Restringido</h2>
            <p class="error404-text text-muted">
                La página que buscas no existe o no tienes los permisos necesarios para acceder a ella.
            </p>
            <a href="{% url 'home' %}" class="btn-back btn shadow-sm">
                Volver al Inicio
            </a>
        </div>
    </div>

    <!-- Bootstrap JS: CDN + fallback local si falla -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>window.bootstrap || document.write('\x3Cscript src="{% static "js/bootstrap.bundle.min.js" %}"\x3E\x3C/script\x3E');</script>
</body>
</html>
