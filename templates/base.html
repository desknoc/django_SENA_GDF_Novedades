<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA GDF Novedades</title>
    <link rel="icon" href="{% static 'img/logosena.png' %}" type="image/png">

    <!-- Bootstrap CSS: CDN + fallback local si falla -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" id="bs-cdn-css">
    <script>
        !function(){
            var e = document.createElement('link');
            e.rel = 'stylesheet';
            e.href = '{% static "css/bootstrap.min.css" %}';
            e.id = 'bs-local-css';
            var t = document.getElementById('bs-cdn-css');
            t.parentNode.insertBefore(e, t.nextSibling);
        }();
    </script>

    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'css/header.css' %}">
    <link rel="stylesheet" href="{% static 'css/novedades.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block sidebar %}{% endblock %}
    {% block header %}{% endblock %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS: CDN + fallback local si falla -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>window.bootstrap || document.write('\x3Cscript src="{% static "js/bootstrap.bundle.min.js" %}"\x3E\x3C/script\x3E');</script>

    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
